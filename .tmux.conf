# Fix PATH for run-shell (Homebrew tmux not in default run-shell PATH on macOS)
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Configure True Colors
# tmux-256color (not screen-256color) + Tc override required for Catppuccin 24-bit colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Change Default TMUX Prefix to "Ctrl-a"
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Change keybinds for splitting windows
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

# Add keybind for easily refreshing tmux configuration
unbind r
bind r source-file ~/.tmux.conf

# Add keybinds for easily resizing tmux panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Add keybind for maximizing and minimizing tmux pane
bind -r m resize-pane -Z

# Enable the mouse in tmux
set -g mouse on
set -g focus-events on

# Claude Code Integration
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Configure vim movements for tmux's copy mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy" # copy text with "y" and send to Mac clipboard

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# Add and configure tmux plugins with tpm
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"

## tpm plugin
set -g @plugin 'tmux-plugins/tpm'

## list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
# Catppuccin theme — Ghostty/nvim/tmux 모두 Catppuccin으로 통일
# 초기 flavor는 latte(light)로 시작; dark-notify가 런타임에 교체함
set -g @plugin 'catppuccin/tmux#v2.1.3'
# tmux-dark-notify: macOS appearance 변경 감지 → latte.conf/mocha.conf 소싱
# 의존성: `brew install cormacrelf/tap/dark-notify`
# 테마 전환 로직은 ~/.config/tmux/apply-theme.sh 에 있음
set -g @plugin 'erikw/tmux-dark-notify'
set -g @dark-notify-theme-path-light "~/.config/tmux/latte.conf"
set -g @dark-notify-theme-path-dark "~/.config/tmux/mocha.conf"
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-cpu' # CPU and RAM usage

# 이 값은 tmux 시작 시 초기값; 런타임 전환은 dark-notify → apply-theme.sh 가 담당
set -g @catppuccin_flavor 'latte'
set -g @catppuccin_window_text " #{=-20:window_name}"
set -g @catppuccin_window_current_text " #{=-20:window_name}"
set -g @catppuccin_window_status_style 'rounded'

set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text '%Y-%m-%d %H:%M'
set -g status-left "#{E:@catppuccin_status_directory}"
set -g status-left-length 50

## Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
